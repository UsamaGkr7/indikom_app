name: indikom_app
description: "Indikom - Multi-role E-commerce App (User/Supplier/Admin)"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.2.7

  # Dependency Injection
  get_it: ^7.7.0

  # Network
  dio: ^5.7.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.2.2

  # Connectivity
  connectivity_plus: ^6.0.5

  # Utils
  intl: ^0.20.0
  path_provider: ^2.1.5
  file_picker: ^6.1.1
  image_picker: ^1.0.4
  cached_network_image: ^3.3.1
  responsive_framework: ^1.4.0
  flutter_svg: ^2.0.9
  json_annotation: ^4.8.1
  pin_code_fields: ^8.0.1
  carousel_slider: ^5.1.2
  animations: ^2.2.0
  awesome_snackbar_content: ^0.1.8
  shimmer_animation: ^2.2.2+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo.jpeg"
  image_path_ios: "assets/icons/app_logo.jpeg"
flutter_native_splash:
  # color: "#FDD426"
  color: "#FFFFFF"
  image: assets/icons/app_logo.jpeg
  android: true
flutter:
  uses-material-design: true

  generate: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/icons/app_logo.jpeg
    - assets/l10n/
